<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule Builder</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      .skip-hint {
        position: fixed;
        right: 16px;
        bottom: 14px;
        margin: 0;
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: rgba(255, 255, 255, 0.85);
        font: 13px/1.3 system-ui, sans-serif;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <video id="splash" src="/splash.mp4" autoplay muted playsinline preload="auto"></video>
    <p class="skip-hint">Press Esc or click to skip</p>
    <script>
      const video = document.getElementById('splash')
      let opened = false

      function openApp() {
        if (opened) return
        opened = true
        const versionQuery = `v=${encodeURIComponent('SCHEDULE_BUILDER_UI_VERSION')}`
        window.location.replace(`/?${versionQuery}`)
      }

      async function waitForApi() {
        for (let attempt = 0; attempt < 240; attempt += 1) {
          try {
            const response = await fetch('/api/health', { cache: 'no-store' })
            if (response.ok) return true
          } catch {
            // API still starting — keep polling while the intro plays.
          }
          await new Promise((resolve) => setTimeout(resolve, 250))
        }
        return false
      }

      function videoFinished() {
        return new Promise((resolve) => {
          if (video.ended) {
            resolve()
            return
          }
          video.addEventListener('ended', () => resolve(), { once: true })
          video.addEventListener('error', () => resolve(), { once: true })
        })
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') openApp()
      })
      document.addEventListener('click', openApp)

      video.defaultMuted = true
      video.muted = true
      void video.play().catch(() => undefined)

      void Promise.all([videoFinished(), waitForApi()]).then(() => openApp())
    </script>
  </body>
</html>
