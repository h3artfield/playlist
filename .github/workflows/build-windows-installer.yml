name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build desktop bundle (PyInstaller)
        shell: pwsh
        run: |
          ./packaging/windows/build_desktop.ps1 -Clean

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "packaging/windows/ScheduleBuilder.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScheduleBuilderSetup
          path: packaging/windows/Output/ScheduleBuilderSetup.exe

      - name: Upload installer to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/Output/ScheduleBuilderSetup.exe
