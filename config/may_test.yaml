# Sandbox config to replay/test week 1 of May without changing production flow.
# Use this in Setup when someone wants to regenerate 2026-05-04 week.

gracenote_binge_id: 45397
nikki_workbook: "../data/2024 Nikki Spreadsheets.xlsx"
timezone_note: local
wrap_episodes: true

# Keep test cursors separate from production.
cursor_state_file: episode_cursors_may_test.json

# Canonical reference set: last 3 weeks of April + first week of May (5-4).
reference_binge_file: "../data/MAY 2026 REFERENCE BINGE.xlsx"
reference_binge_sheet: "5-4-2026"
reference_binge_all_sheets: true
reference_binge_sync_cursor_weeks:
  - "2026-04-27"

# TEST MODE: allow generation starting at week 1 of May.
# Dates strictly before 2026-05-04 are copied from reference; on/after 2026-05-04 are generated.
reference_binge_literal_copy_before: "2026-05-04"

# Keep May as first month in this test chain.
build_sequence_start: "2026-05-01"

shows:
  jim_bowie:
    display_name: "The Adventures of Jim Bowie"
    kind: series
    semantic_group: western
    nikki_sheet: "2025 JIM BOWIE"
    prefix: AJB
    start_episode_index: 60
    overnight_repeat_after: sunday
  texan:
