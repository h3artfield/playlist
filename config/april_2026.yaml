# Paths use forward slashes; adjust if your content workbook or grids files move.
gracenote_binge_id: 45397
# Repo copy (also works on Streamlit Cloud). For a local-only path, use an absolute path instead.
nikki_workbook: "../data/2024 Nikki Spreadsheets.xlsx"
timezone_note: local
# Long multi-week grids often need more episodes than exist in the content workbook; wrapping repeats from episode 1.
wrap_episodes: true
# Optional per show: nikki_columns: { episode, season_episode, year, stars, synopsis } — exact sheet header
# text (matched case-insensitively). Defaults are in code (NikkiColumnHeaders); movies style uses Title + Year.
# Optional per show: nikki_row_filter: green_episode_cell — only load rows with green fill on the Episode cell
# (Carol Burnett sheet). Add more filter types in code as you discover rules on other tabs.
# Next-episode index per show (JSON next to this YAML). Omit to always use start_episode_index from shows:.
cursor_state_file: episode_cursors.json
# Canonical April BINGE: new vs rerun (same EPISODE code as previous row for that show) is read from this file.
# Repo copy — required for Streamlit Cloud (paths are relative to this YAML file’s folder).
reference_binge_file: "../data/APRIL 2026 BINGE.xlsx"
reference_binge_sheet: "4-27-2026"
# Merge advance/repeat rules from every tab in that workbook (all April weeks); first sheet wins on conflicts.
reference_binge_all_sheets: true
# Align Nikki cursors to the reference BINGE for this ISO week so straddle April days match April episode codes.
reference_binge_sync_cursor_weeks:
  - "2026-04-27"
# Calendar days strictly before this date are copied verbatim from the reference BINGE workbook; on/after it, rows
# are generated. Use the **first Monday of the next month** (e.g. 2026-05-04) so Fri–Sun May 1–3 and overnight
# repeats (e.g. Carol after Thu 4/30) match the canonical file, not regenerated Nikki rows.
reference_binge_literal_copy_before: "2026-05-04"

shows:
  jim_bowie:
    display_name: "The Adventures of Jim Bowie"
    kind: series
    nikki_sheet: "2025 JIM BOWIE"
    prefix: AJB
    start_episode_index: 60
    # Prior calendar day 20:00–24:00 → next day 0:00–4:00 (see overnight_repeat; legacy key ``sunday`` = same rule).
    overnight_repeat_after: sunday
  texan:
    display_name: "The Texan"
    kind: series
    nikki_sheet: "The Texan - Note - missing epis"
    prefix: TEX
    # 30-minute episodes (one BINGE row per half-hour). Some April BINGE rows have bad end times — source typo, not 2h.
    binge_row_minutes: 30
  hunter:
    display_name: "Hunter"
    kind: series
    nikki_sheet: "Hunter"
    prefix: HUN
    # April BINGE: one row per clock hour per episode (not two half-hour rows).
    binge_row_minutes: 60
    # Tue 20:00–24:00 → Wed 0:00–4:00 (and every night); schedule rule A.
    overnight_repeat_after: daily
  renegade:
    display_name: "Renegade"
    kind: series
    nikki_sheet: "Renegade"
    prefix: REN
    binge_row_minutes: 60
    # Prior calendar day 20:00–24:00 → next day 0:00–4:00 (schedule rule A).
    overnight_repeat_after: daily
  carol_burnett:
    display_name: "The Carol Burnett Show"
    kind: series
    nikki_sheet: "Carol Burnett - NOTE - EPISODE "
    prefix: CBS
    binge_row_minutes: 60
    # Sheet marks playable episodes with green fill in the Episode column (see note on sheet).
    nikki_row_filter: green_episode_cell
    # Prior day late fringe → next day 0–4 (legacy key ``thursday`` = same daily rule).
    overnight_repeat_after: thursday
  mst3k:
    display_name: "Mystery Science Theater 3000"
    kind: series
    nikki_sheet: "MST3K - NOTE - Each episode fol"
    prefix: MST
    # April BINGE: one row per 2-hour episode block.
    binge_row_minutes: 120
  real_mccoys:
    display_name: "The Real McCoys"
    kind: series
    nikki_sheet: "Real McCoys - NOTE - Each Seaso"
    prefix: MCC
    # Mon–Sat morning: prior 18:00–22:00 → 0:00–4:00; prior 22:00–24:00 → 4:00–6:00. No Sat→Sun repeat:
    # Saturday has no McCoys; Sunday 0:00 is a fresh block from Nikki (not copied from Saturday).
    overnight_repeat_after: daily
    overnight_repeat_pattern: mccoys
    overnight_repeat_morning_weekdays: [monday, tuesday, wednesday, thursday, friday, saturday]
  jump_street:
    display_name: "21 Jump Street"
    kind: series
    nikki_sheet: "21 Jump Street"
    prefix: JMP
    # April BINGE: one row per hour (e.g. 4:00–5:00), one episode per row.
    binge_row_minutes: 60
  saint:
    display_name: "The Saint"
    kind: series
    nikki_sheet: "The Saint - NOTE - Episode titl"
    prefix: SNT
    binge_row_minutes: 60
  laugh_in:
    display_name: "Rowan & Martin's Laugh-In"
    kind: series
    nikki_sheet: "Laugh-In - NOTE - CC Files are "
    prefix: RML
    binge_row_minutes: 60
  lucy:
    display_name: "The Lucy Show"
    kind: series
    nikki_sheet: "Lucy Show"
    prefix: LUC
    nikki_style: generic
  tim_conway:
    display_name: "The Tim Conway Comedy Hour"
    kind: series
    nikki_sheet: "Tim Conway Comedy Hour - Note -"
    prefix: TCC
    binge_row_minutes: 60
    nikki_style: leading_episode

  paid_programming:
    display_name: "Paid Programming"
    kind: literal
  perry_stone:
    display_name: "Perry Stone"
    kind: literal
  sacred_name:
    display_name: "Sacred Name"
    kind: literal
  les_feldick:
    display_name: "Les Feldick Ministries"
    kind: literal
  healthy_christian:
    display_name: "The Healthy Christian with Rich Stocks"
    kind: literal
  michael_youssef:
    display_name: "Michael Youssef"
    kind: literal
  micheal_youssef:
    display_name: "Micheal Youssef"
    kind: literal
  awakening:
    display_name: "The Awakening Hour"
    kind: literal
  time_for_hope:
    display_name: "Time for Hope"
    kind: literal
  rejoyce:
    display_name: "Rejoyce in Jesus"
    kind: literal
  postcard_travel:
    display_name: "Post Card Travel TV"
    kind: literal
  jet_set:
    display_name: "The Jet Set"
    kind: literal

