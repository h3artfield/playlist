  # May — same pattern as April; point grids_file / sheet_name at your May grids workbook & tabs.
  # When you build **May**, the week starting 2026-04-27 is included (Apr 27–May 3) so Fri–Sun May 1–3 appear.
  # That tab is copied into the May grids file on export if it still lives under the April workbook above.
  - monday: "2026-05-04"
    grids_file: "../data/MAY 2026 BINGE GRIDS.xlsx"
    sheet_name: "5-4-2026"
  - monday: "2026-05-11"
